name: release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          cache: false

      - run: go install github.com/tcnksm/ghr@latest

      - name: Build
        run: |
          VERSION=$(cat VERSION)
          GOOS=linux GOARCH=amd64 go build -o dist/sora-archive-uploader_linux_amd64-${VERSION} cmd/sora-archive-uploader/main.go
          GOOS=linux GOARCH=arm64 go build -o dist/sora-archive-uploader_linux_arm64-${VERSION} cmd/sora-archive-uploader/main.go
          GOOS=darwin GOARCH=amd64 go build -o dist/sora-archive-uploader_darwin_amd64-${VERSION} cmd/sora-archive-uploader/main.go
          GOOS=darwin GOARCH=arm64 go build -o dist/sora-archive-uploader_darwin_arm64-${VERSION} cmd/sora-archive-uploader/main.go
          gzip dist/*

      - name: Release
        run: |
          VERSION=$(cat VERSION)
          ghr \
            -t "${{ secrets.GITHUB_TOKEN }}" \
            -u "${{ github.repository_owner }}" \
            -r "sora-archive-uploader" \
            -n "${VERSION}" \
            --replace "${GITHUB_REF##*/}" \
            dist/
